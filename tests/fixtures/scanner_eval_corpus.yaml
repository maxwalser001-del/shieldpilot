# ShieldPilot PromptScanner Evaluation Corpus
#
# Tests the PromptScanner (prompt injection detection) against regex
# patterns across 19 categories.
#
# Schema per entry:
#   text           - the prompt text to scan
#   should_detect  - true if scanner should flag as injection, false if benign
#   category       - primary threat category (null for benign)
#   min_score      - minimum expected score (for attacks, based on severity)
#   max_score      - maximum expected score (for benign entries, 0 = clean)
#   description    - human-readable explanation
#   tags           - list of classification tags
#
# Severity-to-score mapping:
#   critical = 90, high = 70, medium = 45, low = 20
#   Compound bonus: +5 per additional threat beyond the first (capped at 100)
#
# Categories:
#   jailbreak, instruction_override, tool_hijacking, role_manipulation,
#   encoding_bypass, data_exfiltration, fake_system_message,
#   delimiter_injection, emotional_manipulation, authority_impersonation,
#   payload_splitting, context_poisoning, soft_policy_override,
#   state_trust_spoofing, delayed_compliance, obfuscation_evasion,
#   narrative_policy_erosion, presupposition_fake_history


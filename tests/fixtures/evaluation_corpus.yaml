# ShieldPilot Risk Engine Evaluation Corpus
#
# Each entry has:
#   command          – the shell command to evaluate
#   expected_action  – allow / warn / block (with test_config thresholds: block>=80, warn>=40, allow<40)
#   category         – primary risk category (null for benign)
#   description      – human-readable explanation
#
# Scoring notes (test_config):
#   Whitelist: [ls, cat, echo, pwd, whoami] – score capped at 10 → always ALLOW
#   Blacklist: ["rm -rf /", "mkfs", ":(){:|:&};:"] – score 100 → always BLOCK
#   Blacklisted domains: [evil.com, malware.net]
#   Protected paths: [/etc, ~/.ssh, ~/.aws]
#   Thresholds: block >= 80, warn 40-79, allow < 40
#   Scoring: max-weighted + diminishing tail (50% per subsequent signal)
#
# Groups:
#   BENIGN      – Legitimate developer commands (expected: allow)
#   SUSPICIOUS  – Commands that warrant user review (expected: warn)
#   MALICIOUS   – Clearly dangerous commands (expected: block)
#
# Known false-negative notes:
#   Commands starting with a whitelisted base command (cat, echo, ls, pwd, whoami)
#   are ALWAYS capped at score 10 regardless of arguments. This means:
#     cat /etc/shadow → ALLOW (FN, capped by whitelist)
#     echo '...' | crontab - → ALLOW (FN, capped by whitelist)
#   These are documented as KNOWN-FN and excluded from false-negative assertions.

corpus:


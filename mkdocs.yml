site_name: ShieldPilot Docs
site_description: Security firewall for autonomous AI coding agents — documentation
site_url: https://docs.shieldpilot.dev
repo_url: https://github.com/maxwalser001-del/Cyber-Security-
repo_name: ShieldPilot
edit_uri: ""

theme:
  name: material
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  logo: assets/logo.svg
  favicon: assets/logo.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Claude Code Hook: getting-started/hook.md
  - CLI Reference:
    - Overview: cli/overview.md
    - sentinel run: cli/run.md
    - sentinel scan: cli/scan.md
    - sentinel hook: cli/hook.md
  - Configuration:
    - sentinel.yaml: config/sentinel-yaml.md
    - Risk Thresholds: config/thresholds.md
  - Concepts:
    - Risk Engine: concepts/risk-engine.md
    - Injection Scanner: concepts/injection-scanner.md
  - Billing: BILLING.md
  - OS Support: OS_MATRIX.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/maxwalser001-del/Cyber-Security-
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/sentinelai/

copyright: Copyright &copy; 2026 ShieldPilot
